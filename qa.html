<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bahia Bus - Line Editor</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{--ink:#0f1a24;--muted:#5a6b7b;--line:#e7ecf1;--blue:#0e63d6;--red:#b00020;--green:#12a36b;--amber:#e08a00;}
  *{box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif;}
  html,body{margin:0;height:100%;}
  #app{display:flex;height:100vh;}
  #side{width:360px;flex:0 0 360px;background:#fff;border-right:1px solid var(--line);
        display:flex;flex-direction:column;overflow:hidden;}
  #map{flex:1;}
  header{padding:12px 14px;border-bottom:1px solid var(--line);}
  header h1{margin:0;font-size:16px;color:var(--ink);}
  header p{margin:3px 0 0;font-size:11.5px;color:var(--muted);}
  .toolbar{display:flex;gap:6px;flex-wrap:wrap;padding:8px 12px;border-bottom:1px solid var(--line);}
  .btn{font-size:11.5px;padding:6px 9px;border:1px solid var(--line);background:#f7f9fc;border-radius:8px;
       cursor:pointer;color:var(--ink);font-weight:600;}
  .btn:hover{background:#eef2f7;}
  .btn.pri{background:var(--blue);color:#fff;border-color:var(--blue);}
  .btn.warn{background:#fff4e0;border-color:#f0d8a8;color:#8a5a00;}
  #search{margin:8px 12px;padding:8px 11px;border:1px solid var(--line);border-radius:9px;font-size:13px;width:calc(100% - 24px);}
  #list{overflow:auto;flex:1;min-height:90px;}
  .li{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;border-bottom:1px solid #f4f6f9;}
  .li:hover{background:#f4f6f9;} .li.sel{background:#e7f0fe;}
  .sw{width:20px;height:6px;border-radius:3px;flex:0 0 20px;}
  .li .nm{font-size:13px;color:var(--ink);font-weight:600;flex:1;}
  .li .ct{font-size:11px;color:var(--muted);}
  .li .dot{width:8px;height:8px;border-radius:50%;background:var(--amber);visibility:hidden;}
  .li.edited .dot{visibility:visible;}
  #detail{border-top:1px solid var(--line);max-height:52%;overflow:auto;display:none;background:#fcfdff;}
  #detail.show{display:block;}
  #detail h2{margin:0;padding:10px 14px 4px;font-size:13.5px;color:var(--ink);}
  .stp{padding:5px 10px 5px 14px;font-size:12.5px;color:var(--ink);display:flex;gap:7px;align-items:center;border-bottom:1px solid #f1f4f8;}
  .stp.flag{background:#fdecef;}
  .stp .n{color:#fff;border-radius:50%;width:20px;height:20px;flex:0 0 20px;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:700;}
  .stp .lbl{flex:1;cursor:pointer;line-height:1.2;}
  .stp .ar{color:var(--muted);direction:rtl;font-size:11.5px;}
  .stp .ops{display:flex;gap:2px;}
  .op{width:22px;height:22px;border:none;background:transparent;cursor:pointer;border-radius:6px;font-size:13px;color:var(--muted);}
  .op:hover{background:#e9eef5;color:var(--ink);}
  .op.on{color:var(--red);}
  #status{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:1000;background:var(--blue);
          color:#fff;padding:7px 14px;border-radius:20px;font-size:12.5px;box-shadow:0 4px 12px rgba(0,0,0,.2);display:none;}
  .numIcon{border:2px solid #fff;border-radius:50%;color:#fff;font-weight:700;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.4);font-size:11px;}
  .help{font-size:11px;color:var(--muted);padding:6px 14px 10px;line-height:1.5;}
</style></head>
<body><div id="app">
  <div id="side">
    <header><h1>Bahia Bus - Line Editor</h1>
      <p>58 lines - select a line, then fix its stops. Edits autosave. <b>(editor v2)</b></p></header>
    <div class="toolbar">
      <button class="btn pri" onclick="exportCorrections()">Export corrections</button>
      <button class="btn warn" onclick="clearAll()">Clear all edits</button>
    </div>
    <input id="search" placeholder="Filter lines..."/>
    <div id="list"></div>
    <div id="detail"></div>
  </div>
  <div id="map"></div>
</div>
<div id="status"></div>

const LS='bahiabus_edits_v1';
let work = (()=>{try{return JSON.parse(localStorage.getItem(LS))||{};}catch(e){return {};}})();
let selId=null, addMode=false, relocateIdx=null, autoName=true;

const map = L.map('map').setView([NET.center.lat, NET.center.lng], 12);
const voyager = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png',{subdomains:'abcd',maxZoom:20,attribution:'(c) OSM, CARTO'});
const sat = L.layerGroup([
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19}),
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}.png',{subdomains:'abcd',maxZoom:20})
]);
voyager.addTo(map);
L.control.layers({'Map':voyager,'Satellite':sat},null,{collapsed:false}).addTo(map);
let g = L.layerGroup().addTo(map);

function save(){localStorage.setItem(LS,JSON.stringify(work));}
function lineData(id){return NET.lines.find(l=>l.id===id);}
function ensureWork(id){
  if(!work[id]){
    const ln=lineData(id);
    work[id]={dirty:false,stops:ln.stops.map(s=>({oid:s.id,name:s.name,ar:s.ar,lat:s.lat,lng:s.lng,flag:false,isNew:false}))};
  }
  return work[id];
}
function dirty(id){work[id].dirty=true;save();}
function setStatus(t){const s=document.getElementById('status');if(t){s.textContent=t;s.style.display='block';}else{s.style.display='none';}}

function numIcon(i,color,flag,isNew){
  const ring=flag?'box-shadow:0 0 0 3px '+'#b00020;':(isNew?'box-shadow:0 0 0 3px #e08a00;':'');
  return L.divIcon({className:'',html:'<div class="numIcon" style="background:'+color+';'+ring+'width:22px;height:22px;line-height:18px">'+i+'</div>',iconSize:[22,22],iconAnchor:[11,11]});
}
function stopPopup(s,i){
  return '<b>#'+(i+1)+' '+(s.name||'(no name)')+'</b><br>'+
    (s.ar?'<span style="direction:rtl">'+s.ar+'</span><br>':'')+
    '<small>'+s.lat.toFixed(5)+', '+s.lng.toFixed(5)+'</small>'+
    (s.flag?'<br><b style="color:#b00020">flagged wrong</b>':'')+
    (s.isNew?'<br><b style="color:#e08a00">added</b>':'');
}
function draw(){
  g.clearLayers();
  if(!selId)return;
  const ln=lineData(selId), w=ensureWork(selId), st=w.stops;
  const pts=(!w.dirty && ln.path && ln.path.length>1)?ln.path:st.map(s=>[s.lat,s.lng]);
  L.polyline(pts,{color:ln.color,weight:4,opacity:.75,dashArray:w.dirty?'6,8':null}).addTo(g);
  st.forEach((s,i)=>{
    const c=s.flag?'#b00020':(i===0?'#12a36b':(i===st.length-1?'#fb2c53':ln.color));
    const m=L.marker([s.lat,s.lng],{icon:numIcon(i+1,c,s.flag,s.isNew),draggable:true}).addTo(g);
    m.on('dragend',async ev=>{const p=ev.target.getLatLng();s.lat=+p.lat.toFixed(6);s.lng=+p.lng.toFixed(6);await autoRename(s);dirty(selId);draw();renderDetail();});
    m.bindPopup(stopPopup(s,i));
  });
}
function selectLine(id){
  selId=id;addMode=false;relocateIdx=null;setStatus('');
  document.querySelectorAll('.li').forEach(e=>e.classList.toggle('sel',e.dataset.id===id));
  draw();renderDetail();
}
function renderDetail(){
  const d=document.getElementById('detail');if(!selId){d.className='';return;}
  d.className='show';
  const ln=lineData(selId),w=ensureWork(selId);
  let h='<h2>'+ln.name+' <span style="color:#5a6b7b;font-weight:400">- '+w.stops.length+' stops'+(w.dirty?' (edited)':'')+'</span></h2>';
  h+='<div class="toolbar" style="border-top:1px solid var(--line)">'+
     '<button class="btn pri" onclick="startAdd()">+ Add NEW stop</button>'+
     '<label class="btn" style="display:flex;align-items:center;gap:6px;cursor:pointer">'+
       '<input type="checkbox" '+(autoName?'checked':'')+' onchange="autoName=this.checked"> Auto-name (add + move)</label>'+
     '<button class="btn" onclick="resetLine()">Reset line</button></div>';
  w.stops.forEach((s,i)=>{
    const c=s.flag?'#b00020':(i===0?'#12a36b':(i===w.stops.length-1?'#fb2c53':ln.color));
    h+='<div class="stp'+(s.flag?' flag':'')+'">'+
       '<span class="n" style="background:'+c+'">'+(i+1)+'</span>'+
       '<span class="lbl" onclick="fly('+s.lat+','+s.lng+')">'+(s.name||'(no name)')+
         (s.ar?' <span class="ar">'+s.ar+'</span>':'')+'</span>'+
       '<span class="ops">'+
         '<button class="op" title="Move up" onclick="mv('+i+',-1)">&#9650;</button>'+
         '<button class="op" title="Move down" onclick="mv('+i+',1)">&#9660;</button>'+
         '<button class="op'+(s.flag?' on':'')+'" title="Flag wrong" onclick="flag('+i+')">&#9873;</button>'+
         '<button class="op" title="Rename" onclick="rename('+i+')">&#9998;</button>'+
         '<button class="op" title="Move - then click the map (auto-renames if Auto-name is on)" onclick="relocate('+i+')">&#10010;</button>'+
         '<button class="op" title="Delete" onclick="del('+i+')">&#10006;</button>'+
       '</span></div>';
  });
  h+='<div class="help">Tip: drag a numbered marker to move it. Green = first stop, red = last. Use &#9650;&#9660; to fix order.</div>';
  d.innerHTML=h;
  renderList(document.getElementById('search').value);
}
function fly(lat,lng){map.setView([lat,lng],16);}
function mv(i,dir){const w=ensureWork(selId),j=i+dir;if(j<0||j>=w.stops.length)return;const t=w.stops[i];w.stops[i]=w.stops[j];w.stops[j]=t;dirty(selId);draw();renderDetail();}
function flag(i){const w=ensureWork(selId);w.stops[i].flag=!w.stops[i].flag;dirty(selId);draw();renderDetail();}
function rename(i){const w=ensureWork(selId),s=w.stops[i];const n=prompt('Stop name (French/English):',s.name||'');if(n===null)return;s.name=n.trim();const a=prompt('Arabic name (optional, leave as-is to keep):',s.ar||'');if(a!==null)s.ar=a.trim();dirty(selId);draw();renderDetail();}
function relocate(i){relocateIdx=i;addMode=false;setStatus('Click the map to set the new position of stop #'+(i+1));}
function del(i){const w=ensureWork(selId);if(!confirm('Delete stop "'+(w.stops[i].name||'')+'"?'))return;w.stops.splice(i,1);dirty(selId);draw();renderDetail();}
function startAdd(){addMode=true;relocateIdx=null;setStatus('ADD MODE: click the map to add a NEW stop to '+lineData(selId).name+'. Press Esc to cancel.');}
function resetLine(){if(!confirm('Discard all edits for this line?'))return;delete work[selId];save();draw();renderDetail();}

// Best-effort name at a point in one language. Uses the named feature if the
// click lands on one; otherwise falls back to the nearest named place (road,
// neighbourhood, suburb...) returned by reverse geocoding.
async function revName(lat,lng,lang){
  try{
    const u='https://nominatim.openstreetmap.org/reverse?format=jsonv2&namedetails=1&zoom=18&accept-language='+lang+'&lat='+lat+'&lon='+lng;
    const j=await (await fetch(u,{headers:{'Accept-Language':lang}})).json();
    const nd=j.namedetails||{}, a=j.address||{};
    return (nd['name:'+lang]||nd.name||j.name||a.road||a.pedestrian||a.neighbourhood||
            a.suburb||a.residential||a.quarter||a.city_district||a.village||a.town||a.city||'').trim();
  }catch(e){return '';}
}
// Re-name a stop from its current coordinates (FR + AR) after it is moved, so a
// stop's name follows its location. Honours the Auto-name toggle; keeps the old
// name if nothing is found nearby.
async function autoRename(s){
  if(!autoName)return;
  setStatus('Looking up name for new location...');
  const r=await Promise.all([revName(s.lat,s.lng,'fr'),revName(s.lat,s.lng,'ar')]);
  if(r[0])s.name=r[0];
  if(r[1])s.ar=r[1];
  setStatus((r[0]||r[1])?('Renamed: '+(r[0]||'?')+(r[1]?' / '+r[1]:'')):'No name found - kept old name');
  setTimeout(()=>setStatus(''),3500);
}
async function addStopAt(ll){
  addMode=false;
  let fr='',ar='';
  if(autoName){
    setStatus('Looking up name (FR + AR)...');
    const r=await Promise.all([revName(ll.lat,ll.lng,'fr'),revName(ll.lat,ll.lng,'ar')]);
    fr=r[0];ar=r[1];
  }
  setStatus('');
  const name=prompt('NEW stop name (French)'+(autoName?' - auto-filled, edit if needed':'')+':',fr);
  if(name===null)return;
  const arIn=prompt('Arabic name'+(autoName?' - auto-filled, edit if needed':'')+':',ar);
  const arName=(arIn!==null?arIn:ar);
  const w=ensureWork(selId);
  w.stops.push({name:name.trim(),ar:arName.trim(),lat:+ll.lat.toFixed(6),lng:+ll.lng.toFixed(6),flag:false,isNew:true});
  dirty(selId);draw();renderDetail();
}
map.on('click',async e=>{
  if(!selId)return;
  if(addMode){addStopAt(e.latlng);}
  else if(relocateIdx!=null){const w=ensureWork(selId),s=w.stops[relocateIdx];s.lat=+e.latlng.lat.toFixed(6);s.lng=+e.latlng.lng.toFixed(6);relocateIdx=null;await autoRename(s);dirty(selId);draw();renderDetail();}
});
// Esc cancels any pending add/move mode.
document.addEventListener('keydown',e=>{if(e.key==='Escape'){addMode=false;relocateIdx=null;setStatus('');}});

function renderList(filter){
  const el=document.getElementById('list');el.innerHTML='';
  NET.lines.filter(l=>!filter||l.name.toLowerCase().includes(filter.toLowerCase())).forEach(l=>{
    const ed=work[l.id]&&work[l.id].dirty;
    const div=document.createElement('div');
    div.className='li'+(l.id===selId?' sel':'')+(ed?' edited':'');div.dataset.id=l.id;
    const ct=(work[l.id]?work[l.id].stops.length:l.stops.length);
    div.innerHTML='<span class="sw" style="background:'+l.color+'"></span>'+
      '<span class="nm">'+l.name+'</span><span class="ct">'+ct+'</span><span class="dot"></span>';
    div.onclick=()=>selectLine(l.id);
    el.appendChild(div);
  });
}
function exportCorrections(){
  const out={generated:new Date().toISOString(),lines:[]};
  Object.keys(work).forEach(id=>{if(!work[id].dirty)return;const ln=lineData(id);
    out.lines.push({id:id,name:ln.name,color:ln.color,
      stops:work[id].stops.map(s=>({id:(s.oid!==undefined?s.oid:null),name:s.name,ar:s.ar,lat:s.lat,lng:s.lng,flag:!!s.flag,isNew:!!s.isNew}))});});
  if(!out.lines.length){alert('No edited lines yet. Edit a line first (drag a stop, flag, add, reorder...).');return;}
  const txt=JSON.stringify(out,null,2);
  const blob=new Blob([txt],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='bahia_corrections.json';a.click();
  try{navigator.clipboard.writeText(txt);}catch(e){}
  setStatus(out.lines.length+' edited line(s) exported - downloaded + copied to clipboard');
  setTimeout(()=>setStatus(''),4000);
}
function clearAll(){if(!confirm('Discard ALL edits on every line?'))return;work={};save();draw();renderDetail();renderList(document.getElementById('search').value);}

document.getElementById('search').oninput=e=>renderList(e.target.value);
renderList('');
selectLine(NET.lines[0].id);
</script></body></html>
